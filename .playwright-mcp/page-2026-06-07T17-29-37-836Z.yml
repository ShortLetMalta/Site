  - generic [ref=e344]:
    - generic [ref=e345]:
      - generic [ref=e346]: Common Questions
      - heading "MTA Licence — What Owners Ask" [level=2] [ref=e347]
    - generic [ref=e348]:
      - generic [ref=e349]:
        - button "Do I need an MTA licence if I only rent occasionally?" [ref=e350] [cursor=pointer]:
          - generic [ref=e351]: Do I need an MTA licence if I only rent occasionally?
          - img [ref=e353]
        - generic [ref=e356]: Yes — the licence applies regardless of frequency. Any property rented to tourists for any period under 3 months requires a Holiday Furnished Premises Licence. There are no exemptions for casual or occasional rentals.
      - generic [ref=e357]:
        - button "Does each property need its own licence?" [ref=e358] [cursor=pointer]:
          - generic [ref=e359]: Does each property need its own licence?
          - img [ref=e361]
        - generic [ref=e363]: Yes. Licences are property-specific, not owner-specific or agency-specific. If you own three apartments and want to rent all three, you need three separate licences — each with its own application, inspection, and annual fee. There is no blanket licence covering multiple units.
      - generic [ref=e364]:
        - button "How long does it take to get the licence?" [ref=e365] [cursor=pointer]:
          - generic [ref=e366]: How long does it take to get the licence?
          - img [ref=e368]
        - generic [ref=e370]: The MTA targets 5 working days for initial document vetting, then schedules a property inspection, followed by 10 working days for final approval. In practice, plan for 4–6 weeks from submission to licence in hand — assuming documents are complete and the property passes inspection first time. Eleva's pre-inspection preparation means our properties overwhelmingly pass on the first visit.
      - generic [ref=e371]:
        - button "I live abroad. Can Eleva handle everything remotely?" [ref=e372] [cursor=pointer]:
          - generic [ref=e373]: I live abroad. Can Eleva handle everything remotely?
          - img [ref=e375]
        - generic [ref=e377]: Yes — most of our owners are overseas. Eleva acts as your full local representative throughout the process. We submit the application, manage MTA correspondence, attend the inspection, and receive the licence on your behalf. You don't need to be in Malta at any point.
      - generic [ref=e378]:
        - button "What if my property fails the inspection?" [ref=e379] [cursor=pointer]:
          - generic [ref=e380]: What if my property fails the inspection?
          - img [ref=e382]
        - generic [ref=e384]: Before any MTA submission, Eleva conducts a pre-inspection walkthrough of your property against MTA standards. We identify and resolve compliance gaps — fire equipment, furnishing standards, signage — before the official visit. Our properties pass on the first submission.
      - generic [ref=e385]:
        - button "What does the MTA licence cost and who pays?" [ref=e386] [cursor=pointer]:
          - generic [ref=e387]: What does the MTA licence cost and who pays?
          - img [ref=e389]
        - generic [ref=e391]: The MTA annual fee is €130 per unit in Malta (€104 in Gozo), paid directly to the MTA by the owner. A one-time application fee also applies. Eleva's service — preparing and managing the entire licencing process — is included in your management agreement at no additional charge.
      - generic [ref=e392]:
        - button "Can I rent my property while the application is pending?" [ref=e393] [cursor=pointer]:
          - generic [ref=e394]: Can I rent my property while the application is pending?
          - img [ref=e396]
        - generic [ref=e398]: No. You must hold a valid licence before accepting any bookings. From May 2026, Airbnb and Booking.com verify licence numbers — unlicensed properties are at risk of listing removal. This makes getting started immediately the only safe course of action.
