  - generic [ref=e391]:
    - generic [ref=e392]:
      - generic [ref=e393]: Common Questions
      - heading "What owners ask about the MTA licence" [level=2] [ref=e394]
    - generic [ref=e395]:
      - generic [ref=e396]:
        - button "Do I need a licence if I only rent occasionally?" [ref=e397] [cursor=pointer]:
          - generic [ref=e398]: Do I need a licence if I only rent occasionally?
          - img [ref=e400]
        - generic [ref=e403]: Yes — the licence applies regardless of frequency. Any property rented to tourists for any period under 3 months requires a Holiday Furnished Premises Licence. There are no exemptions for occasional or seasonal rentals.
      - generic [ref=e404]:
        - button "Does each property need its own licence?" [ref=e405] [cursor=pointer]:
          - generic [ref=e406]: Does each property need its own licence?
          - img [ref=e408]
        - generic [ref=e410]: Yes. Licences are property-specific — not owner-specific or agency-specific. If you own three apartments and want to rent all three, you need three separate licences, each with its own application, inspection, and annual fee. There is no blanket licence covering multiple units.
      - generic [ref=e411]:
        - button "How long does the licencing process take?" [ref=e412] [cursor=pointer]:
          - generic [ref=e413]: How long does the licencing process take?
          - img [ref=e415]
        - generic [ref=e417]: The MTA targets 5 working days for document vetting, followed by a property inspection, and 10 further working days for approval. In practice, plan for 4–6 weeks from submission to licence — assuming complete documents and a first-time inspection pass, which Eleva's pre-inspection walkthrough is designed to ensure.
      - generic [ref=e418]:
        - button "I live abroad — can Eleva handle everything remotely?" [ref=e419] [cursor=pointer]:
          - generic [ref=e420]: I live abroad — can Eleva handle everything remotely?
          - img [ref=e422]
        - generic [ref=e424]: Yes — most of our owners are overseas. Eleva acts as your full local representative. We submit the application, manage MTA correspondence, attend the inspection, and receive the licence on your behalf. You don't need to be in Malta at any point during the process.
      - generic [ref=e425]:
        - button "What if my property fails the MTA inspection?" [ref=e426] [cursor=pointer]:
          - generic [ref=e427]: What if my property fails the MTA inspection?
          - img [ref=e429]
        - generic [ref=e431]: Before any MTA submission, Eleva conducts a full pre-inspection walkthrough of your property against MTA standards. We identify and resolve compliance gaps — fire equipment, furnishing requirements, signage — before the official visit. Our properties have a strong first-time pass rate as a result.
      - generic [ref=e432]:
        - button "What does the MTA licence cost and who pays for it?" [ref=e433] [cursor=pointer]:
          - generic [ref=e434]: What does the MTA licence cost and who pays for it?
          - img [ref=e436]
        - generic [ref=e438]: The MTA annual licence fee is €130 per unit in Malta (€104 in Gozo), paid directly to the MTA by the owner. A one-time application fee also applies. Eleva's service — preparing and managing the entire licencing process — is included in your management agreement at no additional charge.
      - generic [ref=e439]:
        - button "Can I rent my property while the application is pending?" [ref=e440] [cursor=pointer]:
          - generic [ref=e441]: Can I rent my property while the application is pending?
          - img [ref=e443]
        - generic [ref=e445]: No. You must hold a valid licence before accepting any bookings. From May 2026, Airbnb and Booking.com verify licence numbers and unlicensed properties face listing removal. This makes starting the application process immediately the only safe path forward.
