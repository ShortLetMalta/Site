          - generic [ref=e335]: <div bind="166d83f5-ebf3-c787-ad15-11b38ae60d96" class="blog-title">
          - text: The Complete Guide to MTA Short-Let Licensing in Malta (2026)</div></div>
          - generic [ref=e336]: <h2 class="heading-2">
          - text: The Complete Guide to MTA Short-Let Licensing in Malta (2026)</h2>
          - generic [ref=e337]: <div bind="cb4caad2-2850-7e8b-a4c3-d60018a8c791" class="paragraph-articolo w-richtext">
          - text: <p>Every short-let property in Malta must hold a valid <strong>MTA Holiday Furnished Premises Licence</strong> before accepting a single booking. This applies regardless of the platform — Airbnb, Booking.com, or direct — and regardless of how many nights per year you rent. There are no exemptions for occasional or seasonal rentals.</p><h3>What Is an MTA Holiday Furnished Premises Licence?</h3><p>The MTA Holiday Furnished Premises Licence is issued by the Malta Tourism Authority and certifies that a property meets minimum standards for short-term tourist accommodation. Standards cover fire safety, electrical installation, furnishing quality, emergency signage, and habitability.</p><p>The licence is <strong>property-specific</strong> — not owner-specific or agency-specific. Each individual unit requires its own application, inspection, and fee. If you own three apartments and wish to rent all three, you need three separate licences.</p><h3>Who Applies for the Licence?</h3><p>The licence is held by the property owner. If a management company handles the property, the owner remains the licence holder. Eleva prepares and manages the full application as a service — owners simply provide the required documents and sign where needed.</p><h2>Documents Required</h2><p>The following documents are required for a standard application:</p>
          - generic [ref=e338]: <ul role="list">
          - text: "<li><strong>Valid ID</strong> of the applicant (ID card or passport)</li><li><strong>Proof of ownership</strong> (deed of sale or title document) or a signed lease contract</li><li><strong>Written owner consent</strong> if the applicant is not the registered property owner</li><li><strong>Third-party liability insurance</strong> with a minimum coverage of €250,000</li><li><strong>Building permits and compliance evidence</strong></li><li><strong>Perit (architect) declaration</strong> confirming the property’s structural conformity and habitability</li><li>If applying as a company: <strong>Memorandum and Articles of Association</strong> plus a board resolution</li></ul><p>Missing documents pause the vetting clock. Eleva coordinates with a certified Perit and prepares the full application package to avoid delays.</p><h3>The Application Process Step by Step</h3>"
          - generic [ref=e339]: <ol role="list">
          - text: "<li><strong>Online application</strong> submitted via the MTA portal with all supporting documents.</li><li><strong>Initial vetting — 5 working days:</strong> The MTA reviews documents. If anything is incomplete, the clock pauses until resolved.</li><li><strong>Property inspection:</strong> An MTA inspector visits the property to assess compliance. The property must be fully furnished and ready for guests.</li><li><strong>Final approval — 10 working days</strong> after a positive inspection.</li></ol><p><strong>Realistic total timeline: 4–6 weeks</strong> from initial submission to licence in hand, assuming documents are complete and the property passes inspection first time.</p><h3>How Much Does an MTA Licence Cost?</h3><p>The current MTA licence fee is approximately:</p>"
          - generic [ref=e340]: <ul role="list">
          - text: <li><strong>€130 per unit</strong> for properties in Malta</li><li><strong>€104 per unit</strong> for properties in Gozo</li></ul><p>These fees are paid directly to the MTA and are separate from any management company charges.</p><h3>Post-Licence Obligations</h3><p>Receiving your MTA licence is not the end. Licensed operators have ongoing obligations:</p>
          - generic [ref=e341]: <ul role="list">
          - text: <li><strong>Display the licence number on all listings</strong> — Airbnb, Booking.com, and every other platform. From May 2026, platforms are legally required to verify registration numbers.</li><li><strong>Physical notice at the property</strong> showing the MTA licence number and a 24/7 emergency contact.</li><li><strong>Notify the building administrator</strong> if the property is in a condominium.</li><li><strong>Maintain a waste collection management plan.</strong></li><li><strong>VAT and fiscal receipt compliance</strong> for all rental income.</li><li><strong>Eco-Tax collection</strong> — €0.50 per adult per night collected from guests and remitted to authorities.</li></ul><h3>The 2026 Regulatory Changes</h3><p>Legal Notice 92 of 2026 introduced the most significant overhaul of Malta’s short-let regulations in recent years:</p>
          - generic [ref=e342]: <ul role="list">
          - text: "<li>Booking platforms must now <strong>verify MTA licence numbers</strong> for all Malta listings and share monthly activity data with Maltese authorities.</li><li>Unlicensed operators face <strong>3-year disqualification</strong> from obtaining an MTA licence, plus financial penalties.</li><li>Stricter enforcement of the physical notice requirement at properties.</li></ul><h3>How Eleva Manages Licensing for Property Owners</h3><p>Eleva handles the entire MTA licence process: document preparation, Perit coordination, MTA portal submission, inspection management, and approval tracking. Ongoing compliance — licence number display, Eco-Tax remittance, and renewal management — is included in the standard service. No Eleva-managed property has ever faced a compliance action.</p><h3>Frequently Asked Questions</h3><h4>Can I rent my property while the licence application is pending?</h4><p>No. You must hold a valid licence before accepting any bookings. Platforms now verify licence numbers, so unlicensed properties are at risk of removal.</p><h4>Does the MTA licence need to be renewed?</h4><p>Yes, the licence requires periodic renewal. Eleva manages renewal processes for all properties in its portfolio.</p><h4>What if my property fails the MTA inspection?</h4><p>The MTA issues a list of required remediation works. Once completed, a re-inspection is scheduled. Eleva prepares properties thoroughly before the initial inspection to minimise failure risk.</p></div></div>"
